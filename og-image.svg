<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Ari von Nordenskjöld — software engineer in Zürich</title>
  <desc id="desc">Editorial social card with an orbital system on a midnight background.</desc>
  <defs>
    <radialGradient id="background" cx="78%" cy="35%" r="86%">
      <stop offset="0" stop-color="#14223a"/>
      <stop offset=".48" stop-color="#0a101e"/>
      <stop offset="1" stop-color="#05070d"/>
    </radialGradient>
    <radialGradient id="sun" cx="36%" cy="30%" r="72%">
      <stop offset="0" stop-color="#fff9dd"/>
      <stop offset=".52" stop-color="#f4c76b"/>
      <stop offset="1" stop-color="#d99537"/>
    </radialGradient>
    <filter id="glow" x="-160%" y="-160%" width="420%" height="420%">
      <feGaussianBlur stdDeviation="19"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity=".026"/>
    </pattern>
    <clipPath id="frame">
      <rect x="26" y="26" width="1148" height="578" rx="18"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <g clip-path="url(#frame)">
    <circle cx="1030" cy="-52" r="354" fill="#82dec0" opacity=".025"/>
    <circle cx="865" cy="324" r="244" fill="none" stroke="#ffffff" stroke-opacity=".055" stroke-width="2"/>
    <circle cx="865" cy="324" r="326" fill="none" stroke="#ffffff" stroke-opacity=".035" stroke-width="2"/>
    <ellipse cx="865" cy="324" rx="294" ry="109" fill="none" stroke="#82dec0" stroke-opacity=".8" stroke-width="4" transform="rotate(-24 865 324)"/>
    <ellipse cx="865" cy="324" rx="165" ry="304" fill="none" stroke="#aeb7ee" stroke-opacity=".37" stroke-width="3" transform="rotate(34 865 324)"/>
    <ellipse cx="865" cy="324" rx="278" ry="208" fill="none" stroke="#f4c76b" stroke-opacity=".15" stroke-width="3" transform="rotate(18 865 324)"/>
    <circle cx="865" cy="324" r="75" fill="#f4c76b" opacity=".15" filter="url(#glow)"/>
    <circle cx="865" cy="324" r="31" fill="url(#sun)"/>
    <circle cx="1097" cy="173" r="27" fill="#82dec0" opacity=".15" filter="url(#glow)"/>
    <circle cx="1097" cy="173" r="11" fill="#82dec0" stroke="#071018" stroke-width="4"/>
    <circle cx="664" cy="462" r="8" fill="#f08db8" stroke="#070a12" stroke-width="4"/>
  </g>

  <rect x="26" y="26" width="1148" height="578" rx="18" fill="none" stroke="#ffffff" stroke-opacity=".1"/>
  <path d="M73 96H472" stroke="#82dec0" stroke-opacity=".72" stroke-width="3"/>
  <circle cx="55" cy="96" r="4" fill="#f4c76b"/>
  <text x="73" y="78" fill="#aab6c8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" letter-spacing="4">VNORD.NET / 2026</text>

  <text x="72" y="208" fill="#f7f3e8" font-family="Georgia, Times New Roman, serif" font-size="71" font-weight="400" letter-spacing="-2">ARI VON</text>
  <text x="72" y="280" fill="#f7f3e8" font-family="Georgia, Times New Roman, serif" font-size="71" font-weight="400" letter-spacing="-2">NORDENSKJÖLD</text>

  <text x="74" y="337" fill="#82dec0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" letter-spacing="2.5">SOFTWARE ENGINEER · ZÜRICH</text>
  <path d="M74 379H486" stroke="#ffffff" stroke-opacity=".14"/>
  <text x="74" y="424" fill="#bcc5d3" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="400">Developer tools, compilers,</text>
  <text x="74" y="458" fill="#bcc5d3" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="400">language design, and applied AI.</text>

  <g transform="translate(74 539)">
    <rect width="202" height="38" rx="19" fill="#ffffff" fill-opacity=".045" stroke="#ffffff" stroke-opacity=".1"/>
    <circle cx="22" cy="19" r="5" fill="#82dec0"/>
    <text x="38" y="25" fill="#e5e8ed" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="1.8">EXPLORE THE ORBIT</text>
  </g>
</svg>
